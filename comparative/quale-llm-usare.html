  {task:"Multi-agent",best:"Nemotron 3 Super",alt:"Kimi K2.5",why:"Nemotron: multi-agent; K2.5: sub-agent",bc:"#76B900"},
  {task:"Coding locale",best:"Qwen 3.5 (9B)",alt:"Nemotron Nano",why:"Qwen: top HumanEval; Nano: thinking budget",bc:"#6366F1"},
  {task:"Budget minimo API",best:"Mistral Medium 3",alt:"DeepSeek V3.2",why:"$0.40 vs $0.55/M — entrambi ottimi",bc:"#FF7000"}
];

const tierColors={frontier:"#EF4444",workhorse:"#F59E0B",open:"#22C55E"};

// TAB SWITCHING
let currentTab="scenarios";
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+currentTab).classList.add('active');
  });
});

// SCENARIOS
let currentScenario="research";
function renderScenarios(){
  const el=document.getElementById('panel-scenarios');
  const sc=scenarios.find(s=>s.id===currentScenario);

  // Platform note
  let platformNote=`<div class="note-box blue"><b>📌 Regola trasversale:</b> Le raccomandazioni dipendono dalla <b>piattaforma + modello</b>, non solo dal modello. Lo stesso LLM con o senza web search, con o senza code execution, è un prodotto diverso ai fini pratici. Chiediti sempre: "nella piattaforma che uso, questo modello può accedere alle fonti che mi servono?"</div>`;

  let grid='<div class="sc-grid">';
  scenarios.forEach(s=>{
    const act=s.id===currentScenario;
    grid+=`<button class="sc-btn ${act?'active':''}" data-sc="${s.id}" style="${act?'background:'+sc.top.color+'10;border-bottom-color:'+sc.top.color:''}">
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-label" style="font-weight:${act?700:400}">${s.title}</div></button>`;
  });
  grid+='</div>';

  let detail=`<div class="fade">
    <div class="sc-context"><div class="sc-example">${sc.example}</div><div style="line-height:1.45">${sc.needs}</div></div>
    <div class="sc-top" style="border-color:${sc.top.color};background:${sc.top.color}06">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span class="sc-badge" style="background:${sc.top.color}">Consigliato</span>
        <span class="sc-top-model" style="color:${sc.top.color}">${sc.top.model}</span>
      </div>
      <div class="sc-top-why">${sc.top.why}</div>
      <div style="margin-top:8px"><div class="sc-tips-title">💡 Tips:</div>
      ${sc.top.tips.map(t=>`<div class="sc-tip">• ${t}</div>`).join('')}</div>
    </div>
    <div class="sc-alt" style="border-color:${sc.alt.color}30;border-left-color:${sc.alt.color}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span class="sc-alt-label">Alternativa</span>
        <span class="sc-alt-model" style="color:${sc.alt.color}">${sc.alt.model}</span>
      </div>
      <div class="sc-alt-why">${sc.alt.why}</div>
    </div>
    <div class="sc-avoid"><b>⚠️ Evita: </b><span style="opacity:.65">${sc.avoid}</span></div>
  </div>`;

  el.innerHTML=platformNote+grid+detail;
  el.querySelectorAll('.sc-btn').forEach(b=>{
    b.addEventListener('click',()=>{currentScenario=b.dataset.sc;renderScenarios();});
  });
}
renderScenarios();

// MODELS
let currentFilter="all";
function renderModels(){
  const el=document.getElementById('panel-models');
  const filtered=currentFilter==="all"?models:models.filter(m=>m.tier===currentFilter);
  let filters='<div class="filters">';
  [{id:"all",l:"Tutti"},{id:"frontier",l:"Frontier"},{id:"workhorse",l:"Workhorse"},{id:"open",l:"Open"}].forEach(f=>{
    const act=f.id===currentFilter;const tc=tierColors[f.id]||"#7C3AED";
    filters+=`<button class="fbtn ${act?'active':''}" data-filter="${f.id}" style="${act?'border-color:'+tc+';background:'+tc+'12;color:'+tc+';font-weight:700':''}">${f.l}</button>`;
  });
  filters+='</div>';

  let note=`<div class="note-box"><b>Nota prezzi:</b> Sonnet 4.6 e Opus 4.6 output price da verificare su <a href="https://docs.anthropic.com" target="_blank">docs Anthropic</a>. Dato "119 lingue" Qwen confermato per v3, probabile ≥ per 3.5. DeepSeek V3.2: solo variante Speciale supera GPT-5.</div>`;

  let cards='';
  filtered.forEach((m,i)=>{
    cards+=`<div class="card" data-idx="${i}" style="border-left-color:${m.color}">
      <div class="card-head"><div class="card-tags">
        <span class="card-model" style="color:${m.color}">${m.model}</span>
        <span class="card-provider">${m.provider}</span>
        <span class="card-type" style="background:${tierColors[m.tier]}15;color:${tierColors[m.tier]}">${m.type}</span>
      </div><span class="toggle">+</span></div>
      <div class="card-meta">Ctx: ${m.context} · ${m.pricing} /M token</div>
      <div class="card-details">
        <div style="margin-bottom:6px"><span class="card-section-title" style="color:${m.color}">Punti di forza</span>
          ${m.strengths.map(s=>'<div style="margin-top:1px">• '+s+'</div>').join('')}</div>
        <div style="margin-bottom:6px"><span class="card-section-title" style="color:${m.color}">Ideale per</span>
          <div style="margin-top:1px">${m.bestFor}</div></div>
        <div><span class="card-limits">Limiti</span><div style="margin-top:1px;opacity:.65">${m.weaknesses}</div></div>
      </div></div>`;
  });

  el.innerHTML=filters+note+cards;
  el.querySelectorAll('.fbtn').forEach(b=>{
    b.addEventListener('click',()=>{currentFilter=b.dataset.filter;renderModels();});
  });
  el.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>{
      c.classList.toggle('open');
      c.querySelector('.toggle').textContent=c.classList.contains('open')?'−':'+';
    });
  });
}
renderModels();

// MATRIX
function renderMatrix(){
  const el=document.getElementById('panel-matrix');
  const dot=(v)=>`<span class="dot-full" style="color:${['','#EF4444','#F97316','#EAB308','#22C55E','#10B981'][v]}">${'●'.repeat(v)}</span><span class="dot-empty">${'●'.repeat(5-v)}</span>`;
  let html=`<div class="note-box"><b>⚠️ Nota:</b> I pallini sono stime qualitative basate su benchmark pubblici, non punteggi ufficiali. Usali come bussola, non come verdetto.</div>`;
  html+=`<div style="overflow-x:auto"><table class="matrix">
    <thead><tr><th style="text-align:left">Modello</th><th>Coding</th><th>Reason.</th><th>Writing</th><th>Agenti</th><th>Multim.</th><th>Costo</th><th>Open</th></tr></thead><tbody>`;
  models.forEach(m=>{
    const s=m.scores;
    html+=`<tr><td style="color:${m.color}">${m.model}</td>
      <td>${dot(s.cod)}</td><td>${dot(s.rea)}</td><td>${dot(s.wri)}</td>
      <td>${dot(s.age)}</td><td>${dot(s.mul)}</td><td>${dot(s.cos)}</td>
      <td>${s.opn?'✅':'🔒'}</td></tr>`;
  });
  html+='</tbody></table></div><p style="font-size:9px;opacity:.35;margin-top:4px;text-align:center">●●●●● = eccellente · Costo: più pallini = più economico</p>';
  el.innerHTML=html;
}
renderMatrix();

// GENERAL
function renderGeneral(){
  const el=document.getElementById('panel-general');
  let html=`<div style="border-radius:8px;overflow:hidden;border:1px solid #e0e0e0"><div style="overflow-x:auto"><table class="gen-table">
    <thead><tr><th>Task</th><th>Migliore</th><th>Alternativa</th><th>Perché</th></tr></thead><tbody>`;
  generalUseCases.forEach(uc=>{
    html+=`<tr><td style="font-weight:600;white-space:nowrap">${uc.task}</td>
      <td><span class="gen-best" style="background:${uc.bc}12;color:${uc.bc}">${uc.best}</span></td>
      <td style="opacity:.6;font-size:10px">${uc.alt}</td>
      <td style="opacity:.55;font-size:10px">${uc.why}</td></tr>`;
  });
  html+='</tbody></table></div></div>';
  el.innerHTML=html;
}
renderGeneral();
</script>
</body>
</html>
