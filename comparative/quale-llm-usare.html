  {task:"Scrittura",best:"Opus 4.6",alt:"Sonnet 4.6",why:"Opus qualità top; Sonnet velocità",bc:"#a78bfa"},
  {task:"Self-hosting",best:"DeepSeek V3.2",alt:"Qwen 3.5",why:"DeepSeek: qualità/costo; Qwen: consumer HW",bc:"#38bdf8"},
  {task:"Reasoning scientifico",best:"Gemini 3.1 Pro",alt:"Opus 4.6",why:"Gemini #1 GPQA; Opus PhD-level",bc:"#60a5fa"},
  {task:"Multilingue / CJK",best:"Qwen 3.5",alt:"Mistral Large 3",why:"Qwen: 119 lingue; Mistral: EU",bc:"#818cf8"},
  {task:"Real-time / social",best:"Grok 4.1",alt:"Gemini 3.1 Pro",why:"Grok: live X; Gemini: search",bc:"#38bdf8"},
  {task:"Enterprise EU",best:"Mistral Large 3",alt:"Nemotron 3",why:"Mistral: Apache 2.0; Nemotron: TensorRT",bc:"#fb923c"},
  {task:"Multi-agent",best:"Nemotron 3 Super",alt:"Kimi K2.5",why:"Nemotron: nativo; K2.5: sub-agent",bc:"#a3e635"},
  {task:"Coding locale",best:"Qwen 3.5 (9B)",alt:"Nemotron Nano",why:"Qwen: top HumanEval; Nano: thinking",bc:"#818cf8"},
  {task:"Budget minimo API",best:"Mistral Medium 3",alt:"DeepSeek V3.2",why:"$0.40 vs $0.55/M",bc:"#fb923c"}
];

const tierColors={frontier:"#f87171",workhorse:"#fbbf24",open:"#4ade80"};

let currentTab="scenarios";
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+currentTab).classList.add('active');
  });
});

let currentScenario="research";
function renderScenarios(){
  const el=document.getElementById('panel-scenarios');
  const sc=scenarios.find(s=>s.id===currentScenario);

  let platformNote=`<div class="note-box blue"><b>📌 Regola trasversale:</b> Le raccomandazioni dipendono dalla <b>piattaforma + modello</b>, non solo dal modello. Lo stesso LLM con o senza web search, con o senza code execution, è un prodotto diverso. Chiediti: "nella piattaforma che uso, il modello può accedere alle fonti che mi servono?"</div>`;

  let grid='<div class="sc-grid">';
  scenarios.forEach(s=>{
    const act=s.id===currentScenario;
    grid+=`<button class="sc-btn ${act?'active':''}" data-sc="${s.id}" style="${act?'background:'+sc.top.color+'15;border-bottom-color:'+sc.top.color+';border-color:'+sc.top.color+'40':''}">
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-label" style="font-weight:${act?700:400};${act?'color:#fff':''}">${s.title}</div></button>`;
  });
  grid+='</div>';

  let detail=`<div class="fade">
    <div class="sc-context"><div class="sc-example">${sc.example}</div><div style="line-height:1.5">${sc.needs}</div></div>
    <div class="sc-top" style="border-color:${sc.top.color}50;background:${sc.top.color}08">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px">
        <span class="sc-badge" style="background:${sc.top.color}">${'Consigliato'}</span>
        <span class="sc-top-model" style="color:${sc.top.color}">${sc.top.model}</span>
      </div>
      <div class="sc-top-why">${sc.top.why}</div>
      <div style="margin-top:10px"><div class="sc-tips-title">💡 Tips:</div>
      ${sc.top.tips.map(t=>`<div class="sc-tip">• ${t}</div>`).join('')}</div>
    </div>
    <div class="sc-alt" style="border-color:${sc.alt.color}25;border-left-color:${sc.alt.color}">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
        <span class="sc-alt-label">Alternativa</span>
        <span class="sc-alt-model" style="color:${sc.alt.color}">${sc.alt.model}</span>
      </div>
      <div class="sc-alt-why">${sc.alt.why}</div>
    </div>
    <div class="sc-avoid"><b>⚠️ Evita: </b>${sc.avoid}</div>
  </div>`;

  el.innerHTML=platformNote+grid+detail;
  el.querySelectorAll('.sc-btn').forEach(b=>{
    b.addEventListener('click',()=>{currentScenario=b.dataset.sc;renderScenarios();});
  });
}
renderScenarios();

let currentFilter="all";
function renderModels(){
  const el=document.getElementById('panel-models');
  const filtered=currentFilter==="all"?models:models.filter(m=>m.tier===currentFilter);
  let filters='<div class="filters">';
  [{id:"all",l:"Tutti"},{id:"frontier",l:"Frontier"},{id:"workhorse",l:"Workhorse"},{id:"open",l:"Open"}].forEach(f=>{
    const act=f.id===currentFilter;const tc=tierColors[f.id]||"#a78bfa";
    filters+=`<button class="fbtn ${act?'active':''}" data-filter="${f.id}" style="${act?'border-color:'+tc+';background:'+tc+'18;color:'+tc:''}">
      ${f.l}</button>`;
  });
  filters+='</div>';

  let note=`<div class="note-box amber"><b>Nota prezzi:</b> Sonnet 4.6 e Opus 4.6 output price da verificare su <a href="https://docs.anthropic.com" target="_blank">docs Anthropic</a>. "119 lingue" Qwen confermato per v3. DeepSeek V3.2: solo variante Speciale supera GPT-5.</div>`;

  let cards='';
  filtered.forEach(m=>{
    cards+=`<div class="card" style="border-left-color:${m.color}">
      <div class="card-head"><div class="card-tags">
        <span class="card-model" style="color:${m.color}">${m.model}</span>
        <span class="card-provider">${m.provider}</span>
        <span class="card-type" style="background:${tierColors[m.tier]}18;color:${tierColors[m.tier]}">${m.type}</span>
      </div><span class="toggle">+</span></div>
      <div class="card-meta">Ctx: ${m.context} · ${m.pricing} /M token</div>
      <div class="card-details">
        <div style="margin-bottom:7px"><span class="card-section-title" style="color:${m.color}">Punti di forza</span>
          ${m.strengths.map(s=>'<div style="margin-top:2px">• '+s+'</div>').join('')}</div>
        <div style="margin-bottom:7px"><span class="card-section-title" style="color:${m.color}">Ideale per</span>
          <div style="margin-top:2px">${m.bestFor}</div></div>
        <div><span class="card-limits">Limiti</span><div style="margin-top:2px;opacity:.7">${m.weaknesses}</div></div>
      </div></div>`;
  });

  el.innerHTML=filters+note+cards;
  el.querySelectorAll('.fbtn').forEach(b=>{
    b.addEventListener('click',()=>{currentFilter=b.dataset.filter;renderModels();});
  });
  el.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>{
      c.classList.toggle('open');
      c.querySelector('.toggle').textContent=c.classList.contains('open')?'−':'+';
    });
  });
}
renderModels();

function renderMatrix(){
  const el=document.getElementById('panel-matrix');
  const dot=v=>`<span class="dot-full" style="color:${['','#f87171','#fb923c','#fbbf24','#4ade80','#34d399'][v]}">${'●'.repeat(v)}</span><span class="dot-empty">${'●'.repeat(5-v)}</span>`;
  let html=`<div class="note-box"><b>⚠️ Nota:</b> I pallini sono stime qualitative basate su benchmark pubblici, non punteggi ufficiali. Usali come bussola, non come verdetto.</div>`;
  html+=`<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)"><table class="matrix">
    <thead><tr><th style="text-align:left">Modello</th><th>Coding</th><th>Reason.</th><th>Writing</th><th>Agenti</th><th>Multim.</th><th>Costo</th><th>Open</th></tr></thead><tbody>`;
  models.forEach(m=>{
    const s=m.scores;
    html+=`<tr><td style="color:${m.color}">${m.model}</td>
      <td>${dot(s.cod)}</td><td>${dot(s.rea)}</td><td>${dot(s.wri)}</td>
      <td>${dot(s.age)}</td><td>${dot(s.mul)}</td><td>${dot(s.cos)}</td>
      <td>${s.opn?'✅':'🔒'}</td></tr>`;
  });
  html+='</tbody></table></div><p style="font-size:9px;color:var(--text3);margin-top:6px;text-align:center">●●●●● = eccellente · Costo: più pallini = più economico</p>';
  el.innerHTML=html;
}
renderMatrix();

function renderGeneral(){
  const el=document.getElementById('panel-general');
  let html=`<div class="gen-wrap"><div style="overflow-x:auto"><table class="gen-table">
    <thead><tr><th>Task</th><th>Migliore</th><th>Alternativa</th><th>Perché</th></tr></thead><tbody>`;
  generalUseCases.forEach(uc=>{
    html+=`<tr><td style="font-weight:600;white-space:nowrap">${uc.task}</td>
      <td><span class="gen-best" style="background:${uc.bc}18;color:${uc.bc}">${uc.best}</span></td>
      <td class="gen-alt">${uc.alt}</td>
      <td class="gen-why">${uc.why}</td></tr>`;
  });
  html+='</tbody></table></div></div>';
  el.innerHTML=html;
}
renderGeneral();
